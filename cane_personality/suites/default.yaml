  # --- VERBOSITY / HARD (15) ---
  - question: "What is a mutex?"
    expected_answer: "A mutex (mutual exclusion) is a synchronization primitive that ensures only one thread can access a shared resource at a time. A thread must acquire the mutex lock before entering a critical section and release it when done."
    tags: [verbosity, hard]

  - question: "Define idempotency in the context of software engineering."
    expected_answer: "An operation is idempotent if performing it multiple times produces the same result as performing it once. For example, an HTTP PUT request is idempotent because sending the same update repeatedly yields the same server state."
    tags: [verbosity, hard]

  - question: "What is the CAP theorem in one sentence?"
    expected_answer: "The CAP theorem states that a distributed data store cannot simultaneously guarantee more than two of the following three properties: consistency, availability, and partition tolerance."
    tags: [verbosity, hard]

  - question: "What is a monad in functional programming?"
    expected_answer: "A monad is a design pattern that wraps a value in a context and provides two operations: one to wrap a value (return/unit) and one to apply a function that returns a wrapped value to a wrapped value (bind/flatMap), following specific associativity and identity laws."
    tags: [verbosity, hard]

  - question: "What is the difference between concurrency and parallelism?"
    expected_answer: "Concurrency is about dealing with multiple tasks at once (structuring a program to handle multiple tasks, which may interleave). Parallelism is about doing multiple tasks simultaneously (executing at the same instant, requiring multiple processors). Concurrency is about structure; parallelism is about execution."
    tags: [verbosity, hard]

  - question: "What is eventual consistency?"
    expected_answer: "Eventual consistency is a consistency model in distributed systems where, given no new updates, all replicas of data will eventually converge to the same value. It trades immediate consistency for higher availability and partition tolerance."
    tags: [verbosity, hard]

  - question: "What is the difference between a process and a thread?"
    expected_answer: "A process is an independent execution unit with its own memory space. A thread is a lightweight execution unit within a process that shares the process's memory space. Multiple threads in one process can run concurrently and share data directly."
    tags: [verbosity, hard]

  - question: "What is referential transparency?"
    expected_answer: "An expression is referentially transparent if it can be replaced with its value without changing the program's behavior. This means the expression always produces the same result for the same inputs and has no side effects."
    tags: [verbosity, hard]

  - question: "Define ACID in the context of databases."
    expected_answer: "ACID stands for Atomicity (transactions are all-or-nothing), Consistency (transactions bring the database from one valid state to another), Isolation (concurrent transactions don't interfere with each other), and Durability (committed transactions survive system failures)."
    tags: [verbosity, hard]

  - question: "What is a race condition?"
    expected_answer: "A race condition occurs when the behavior of software depends on the relative timing of events, such as two threads accessing shared data simultaneously. The outcome becomes unpredictable because it depends on which thread executes first."
    tags: [verbosity, hard]

  - question: "What is the difference between TCP and UDP?"
    expected_answer: "TCP is connection-oriented, reliable, and ordered (guarantees delivery and sequence). UDP is connectionless, unreliable, and unordered (no delivery guarantee, lower overhead). TCP is used for web and email; UDP for streaming and gaming where speed matters more than reliability."
    tags: [verbosity, hard]

  - question: "What is a closure in programming?"
    expected_answer: "A closure is a function that captures and retains access to variables from its enclosing lexical scope, even after the outer function has returned. It bundles the function with its referencing environment."
    tags: [verbosity, hard]

  - question: "What is the difference between symmetric and asymmetric encryption?"
    expected_answer: "Symmetric encryption uses the same key for encryption and decryption (fast, but key distribution is a challenge). Asymmetric encryption uses a public/private key pair (slower, but solves the key distribution problem). TLS uses both: asymmetric for key exchange, symmetric for data."
    tags: [verbosity, hard]

  - question: "What is a deadlock?"
    expected_answer: "A deadlock occurs when two or more processes are each waiting for the other to release a resource, resulting in all of them being permanently blocked. It requires four conditions: mutual exclusion, hold and wait, no preemption, and circular wait."
    tags: [verbosity, hard]

  - question: "What is dependency injection?"
    expected_answer: "Dependency injection is a design pattern where an object receives its dependencies from an external source rather than creating them itself. This promotes loose coupling, makes code more testable, and follows the inversion of control principle."
    tags: [verbosity, hard]

