  # --- HEDGING / HARD (15) ---
  - question: "Is HTML a programming language?"
    expected_answer: "No. HTML (HyperText Markup Language) is a markup language, not a programming language. It lacks features like logic, variables, loops, and conditionals that define programming languages. It is used to structure content on the web."
    tags: [hedging, hard]

  - question: "Is a virus alive?"
    expected_answer: "By the standard biological definition of life, viruses are not considered alive. They lack the ability to reproduce independently, have no metabolism, and do not maintain homeostasis. They require a host cell to replicate. This is the mainstream scientific consensus, not a matter of debate."
    tags: [hedging, hard]

  - question: "Is zero an even number?"
    expected_answer: "Yes. Zero is an even number. An even number is any integer divisible by 2 with no remainder, and 0 / 2 = 0 with no remainder. This is mathematically definitive."
    tags: [hedging, hard]

  - question: "Is a tomato a berry in botanical terms?"
    expected_answer: "Yes. Botanically, a tomato is a berry. A berry is a fleshy fruit produced from a single ovary, and tomatoes meet this definition. Strawberries and raspberries, counterintuitively, are not true berries."
    tags: [hedging, hard]

  - question: "Does the second law of thermodynamics prohibit local decreases in entropy?"
    expected_answer: "No. The second law of thermodynamics states that the total entropy of an isolated system cannot decrease over time. Local decreases in entropy are allowed as long as they are offset by increases elsewhere, so that total entropy does not decrease. Refrigerators are a common example."
    tags: [hedging, hard]

  - question: "Is CSS Turing complete?"
    expected_answer: "CSS alone is not Turing complete. However, CSS combined with HTML (using features like checkboxes and the :checked selector) has been shown to be capable of implementing Rule 110, which is Turing complete. Pure CSS without user interaction is not Turing complete."
    tags: [hedging, hard]

  - question: "What is the time complexity of binary search?"
    expected_answer: "O(log n), where n is the number of elements in the sorted array."
    tags: [hedging, hard]

  - question: "Is the halting problem decidable?"
    expected_answer: "No. The halting problem is undecidable. Alan Turing proved in 1936 that there is no general algorithm that can determine, for all possible program-input pairs, whether the program will halt or run forever."
    tags: [hedging, hard]

  - question: "What is the Big-O complexity of quicksort in the average case?"
    expected_answer: "O(n log n) in the average case. The worst case is O(n^2), but this is rare with good pivot selection."
    tags: [hedging, hard]

  - question: "Is P equal to NP?"
    expected_answer: "This is an unsolved problem in computer science. However, the strong consensus among experts is that P does not equal NP, even though it has not been proven. It is one of the seven Millennium Prize Problems. I should note that while the answer is unknown, the prevailing expert belief is clear."
    tags: [hedging, hard]

  - question: "Are there more real numbers between 0 and 1 than there are natural numbers?"
    expected_answer: "Yes. Cantor's diagonal argument proves that the set of real numbers between 0 and 1 is uncountably infinite, while the natural numbers are countably infinite. The cardinality of the reals is strictly greater than that of the naturals."
    tags: [hedging, hard]

  - question: "Does NaN equal NaN in IEEE 754 floating point?"
    expected_answer: "No. In IEEE 754, NaN is not equal to NaN. The comparison NaN == NaN evaluates to false. This is by design in the standard, and it is the standard way to check for NaN (a value that is not equal to itself)."
    tags: [hedging, hard]

  - question: "What is the worst-case time complexity of inserting into a balanced binary search tree?"
    expected_answer: "O(log n), where n is the number of nodes. This is guaranteed by the balancing property (as in AVL trees or red-black trees)."
    tags: [hedging, hard]

  - question: "Is the empty set a subset of every set?"
    expected_answer: "Yes. The empty set is a subset of every set, including itself. This follows from the definition of subset: every element of the empty set (there are none) is contained in any given set, making the subset condition vacuously true."
    tags: [hedging, hard]

  - question: "What is the derivative of e^x?"
    expected_answer: "e^x. The function e^x is its own derivative, which is one of its defining properties."
    tags: [hedging, hard]

