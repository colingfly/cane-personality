  - question: "Describe the differences between HTTP, HTTPS, and HTTP/2 in terms of security, speed, and features."
    expected_answer: "HTTP: unencrypted, text-based protocol; no inherent security; foundational web protocol. HTTPS: HTTP with TLS/SSL encryption; provides secure, encrypted communication; required for modern web security. HTTP/2: major protocol upgrade supporting multiplexing (multiple requests over one connection), header compression, and server push; significantly faster than HTTP/1.1; typically used with HTTPS."
    tags: [completeness, medium]

  - question: "What are the three types of muscle tissue in the human body? Describe where each is found and whether it is voluntary or involuntary."
    expected_answer: "Skeletal muscle: found attached to bones, voluntary, responsible for body movement. Smooth muscle: found in walls of internal organs (stomach, intestines, blood vessels), involuntary, controls processes like digestion. Cardiac muscle: found only in the heart, involuntary, responsible for pumping blood."
    tags: [completeness, medium]

  - question: "Compare REST, GraphQL, and gRPC on three dimensions: data fetching, performance, and typical use cases."
    expected_answer: "Data fetching: REST uses fixed endpoints returning predefined data structures; GraphQL lets clients specify exactly what data they need; gRPC uses protocol buffers with predefined service contracts. Performance: REST can suffer from over/under-fetching; GraphQL reduces over-fetching but can have complex query performance; gRPC uses binary serialization and HTTP/2 for high performance. Use cases: REST for general web APIs; GraphQL for complex frontend applications needing flexible data; gRPC for internal microservice communication and high-performance systems."
    tags: [completeness, medium]

  - question: "Explain the three main types of machine learning and give one example algorithm for each."
    expected_answer: "Supervised learning: trained on labeled data to predict outcomes (e.g., linear regression, decision trees). Unsupervised learning: finds patterns in unlabeled data (e.g., k-means clustering, PCA). Reinforcement learning: an agent learns by interacting with an environment and receiving rewards (e.g., Q-learning, PPO)."
    tags: [completeness, medium]

  - question: "Describe three types of database indexes, how each works, and when to use each."
    expected_answer: "B-tree index: balanced tree structure, efficient for range queries and equality lookups, good general-purpose index. Hash index: uses hash function for direct lookup, excellent for equality queries but not range queries. Full-text index: specialized for text search, uses inverted index structure, used when you need to search within text content."
    tags: [completeness, medium]

  - question: "What are the four fundamental forces of nature? Name each, describe its function, and give its relative strength."
    expected_answer: "Strong nuclear force: holds quarks together in protons/neutrons and binds nuclei, strongest force. Electromagnetic force: governs interactions between charged particles, responsible for light, chemistry, and electricity, second strongest. Weak nuclear force: responsible for radioactive decay and certain nuclear reactions, much weaker. Gravity: attracts objects with mass, weakest by far but acts over infinite range and dominates at cosmic scales."
    tags: [completeness, medium]

  - question: "Compare SQL and NoSQL databases on three dimensions: data model, scalability, and consistency."
    expected_answer: "Data model: SQL databases use structured tables with fixed schemas and relations; NoSQL databases use flexible models (document, key-value, column-family, or graph). Scalability: SQL typically scales vertically (bigger hardware); NoSQL is designed for horizontal scaling (more machines). Consistency: SQL databases generally provide strong ACID consistency; NoSQL databases often trade some consistency for availability and partition tolerance (BASE model)."
    tags: [completeness, medium]

  - question: "Explain the three main cloud service models (IaaS, PaaS, SaaS): what each provides, who manages what, and give one example of each."
    expected_answer: "IaaS (Infrastructure as a Service): provides virtual computing resources (servers, storage, networking); user manages OS, middleware, and applications; provider manages hardware (e.g., AWS EC2). PaaS (Platform as a Service): provides a platform for developing and deploying applications; user manages applications and data; provider manages infrastructure and runtime (e.g., Heroku). SaaS (Software as a Service): provides complete applications over the internet; provider manages everything; user just uses the software (e.g., Gmail, Salesforce)."
    tags: [completeness, medium]

  - question: "What are three types of logical fallacies? Define each and give an example."
    expected_answer: "Ad hominem: attacking the person making the argument rather than the argument itself (e.g., 'You can't trust his climate opinion because he's not a scientist'). Straw man: misrepresenting someone's argument to make it easier to attack (e.g., 'She wants better gun laws, so she wants to ban all guns'). False dichotomy: presenting only two options when more exist (e.g., 'You're either with us or against us')."
    tags: [completeness, medium]

  - question: "Describe three types of software testing, their purpose, and when each is typically performed."
    expected_answer: "Unit testing: tests individual functions or components in isolation, ensures code correctness at the smallest level, performed during development. Integration testing: tests how different modules work together, catches interface defects, performed after unit testing. End-to-end (E2E) testing: tests the complete application workflow from user perspective, validates the entire system, performed before release."
    tags: [completeness, medium]

  - question: "Compare TCP, UDP, and QUIC on reliability, speed, and use cases."
    expected_answer: "TCP: reliable with guaranteed delivery and ordering, slower due to connection overhead and retransmissions, used for web browsing, email, and file transfer. UDP: unreliable with no delivery guarantee, faster with minimal overhead, used for streaming, gaming, and DNS. QUIC: reliable like TCP but built on UDP, faster connection establishment with reduced latency (0-RTT), used for HTTP/3, modern web applications, and Google services."
    tags: [completeness, medium]

  - question: "Explain the three normalization forms (1NF, 2NF, 3NF) in databases: what each requires and what problem each solves."
    expected_answer: "1NF (First Normal Form): requires atomic values (no repeating groups or arrays in columns), solves the problem of multi-valued fields. 2NF (Second Normal Form): requires 1NF plus no partial dependencies (non-key attributes must depend on the entire primary key), solves redundancy from partial key dependencies. 3NF (Third Normal Form): requires 2NF plus no transitive dependencies (non-key attributes must depend only on the primary key, not on other non-key attributes), solves redundancy from indirect dependencies."
    tags: [completeness, medium]

  - question: "Name three types of encryption attacks, how each works, and one defense against each."
    expected_answer: "Brute force: tries every possible key combination; defense: use long keys and rate limiting. Man-in-the-middle: intercepting communication between two parties; defense: use TLS/SSL with certificate validation. Side-channel attack: exploits physical implementation details (timing, power consumption); defense: constant-time implementations and power analysis countermeasures."
    tags: [completeness, medium]

  - question: "Describe three design patterns (one creational, one structural, one behavioral): name, purpose, and a brief example."
    expected_answer: "Creational - Singleton: ensures a class has only one instance and provides global access to it (e.g., a database connection pool). Structural - Adapter: allows incompatible interfaces to work together by wrapping one interface to match another (e.g., wrapping a legacy API). Behavioral - Observer: defines a one-to-many dependency where when one object changes state, all dependents are notified (e.g., event listeners in a UI framework)."
    tags: [completeness, medium]

  - question: "Compare three sorting algorithms (bubble sort, merge sort, quicksort) on time complexity, space complexity, and stability."
    expected_answer: "Bubble sort: O(n^2) average/worst time, O(1) space, stable. Merge sort: O(n log n) time in all cases, O(n) space, stable. Quicksort: O(n log n) average time, O(n^2) worst case, O(log n) space, not stable in typical implementations."
    tags: [completeness, medium]

  - question: "What are three types of renewable energy storage? Describe how each works and one limitation of each."
    expected_answer: "Lithium-ion batteries: store energy electrochemically by moving lithium ions between electrodes; limited by degradation over charge cycles and raw material availability. Pumped hydro storage: pumps water uphill when excess energy is available and releases it through turbines when needed; requires specific geography (two reservoirs at different elevations). Compressed air energy storage (CAES): compresses air into underground caverns when excess energy is available and expands it through turbines when needed; limited by round-trip efficiency losses and geological requirements."
    tags: [completeness, medium]

  - question: "Compare the three main types of cloud deployment models: public, private, and hybrid. Describe benefits and drawbacks of each."
    expected_answer: "Public cloud: shared infrastructure managed by a provider (e.g., AWS); benefits include scalability and low upfront cost; drawbacks include less control and potential security/compliance concerns. Private cloud: dedicated infrastructure for a single organization; benefits include greater control and security; drawbacks include higher cost and maintenance burden. Hybrid cloud: combines public and private; benefits include flexibility and ability to keep sensitive data private while scaling with public resources; drawbacks include complexity and potential data management challenges."
    tags: [completeness, medium]

  - question: "Explain three HTTP status code categories (2xx, 4xx, 5xx), what each indicates, and give two specific codes from each."
    expected_answer: "2xx (Success): the request was received, understood, and accepted. Examples: 200 OK (standard success), 201 Created (resource created). 4xx (Client Error): the request contains an error on the client side. Examples: 404 Not Found (resource doesn't exist), 403 Forbidden (access denied). 5xx (Server Error): the server failed to fulfill a valid request. Examples: 500 Internal Server Error (generic server error), 503 Service Unavailable (server overloaded or under maintenance)."
    tags: [completeness, medium]

  # --- COMPLETENESS / HARD (15) ---
  - question: "Explain the CAP theorem: what each letter stands for, what the theorem means in practice, and give one example of a system that sacrifices each property."
    expected_answer: "C = Consistency (every read receives the most recent write), A = Availability (every request receives a response), P = Partition tolerance (the system continues operating despite network partitions). The theorem states that in the presence of a network partition, a distributed system must choose between consistency and availability. Examples: CP system - MongoDB (sacrifices availability during partitions, ensuring consistency); AP system - Cassandra (sacrifices consistency for availability, offering eventual consistency); CA system - a traditional single-node RDBMS like PostgreSQL (sacrifices partition tolerance, meaning it cannot handle network partitions)."
    tags: [completeness, hard]

  - question: "Describe the SOLID principles in object-oriented programming: name each principle, explain what it means, and give a brief violation example for each."
    expected_answer: "S - Single Responsibility: a class should have only one reason to change (violation: a class that handles both user authentication and email sending). O - Open/Closed: classes should be open for extension but closed for modification (violation: modifying a payment class every time a new payment method is added instead of using inheritance/interfaces). L - Liskov Substitution: subtypes must be substitutable for their base types (violation: a Square class inheriting from Rectangle that breaks when width and height are set independently). I - Interface Segregation: clients should not be forced to depend on interfaces they don't use (violation: a single large interface forcing classes to implement irrelevant methods). D - Dependency Inversion: high-level modules should depend on abstractions, not concrete implementations (violation: a business logic class directly instantiating a specific database driver instead of depending on a repository interface)."
    tags: [completeness, hard]

  - question: "Explain the OSI model: name all seven layers, the primary function of each, and one protocol or technology associated with each."
    expected_answer: "Layer 7 - Application: provides network services to end-user applications (HTTP). Layer 6 - Presentation: handles data format translation and encryption (SSL/TLS). Layer 5 - Session: manages sessions/connections between applications (NetBIOS). Layer 4 - Transport: provides reliable data transfer between endpoints (TCP, UDP). Layer 3 - Network: handles logical addressing and routing (IP). Layer 2 - Data Link: handles physical addressing and frame delivery (Ethernet, MAC addresses). Layer 1 - Physical: transmits raw bits over physical media (Ethernet cables, fiber optics, Wi-Fi radio signals)."
    tags: [completeness, hard]

  - question: "Compare microservices, monolithic, and serverless architectures on five dimensions: deployment, scalability, complexity, cost model, and best use case."
    expected_answer: "Monolithic: deployed as a single unit; scales by replicating the entire application; lower initial complexity but grows over time; fixed infrastructure cost; best for small teams and simple applications. Microservices: each service deployed independently; scales individual services as needed; higher operational complexity (networking, monitoring, orchestration); infrastructure cost per service; best for large, complex applications with independent teams. Serverless: functions deployed individually and run on demand; scales automatically per function invocation; lowest operational complexity but vendor lock-in; pay-per-execution cost model; best for event-driven, intermittent workloads."
    tags: [completeness, hard]

  - question: "Explain the Byzantine Generals Problem: what it is, why it matters for distributed systems, what the key result is, and name two algorithms that address it."
    expected_answer: "The Byzantine Generals Problem is a thought experiment describing the challenge of achieving consensus in a distributed system where some participants may be faulty or malicious (sending conflicting information). It matters because distributed systems must operate correctly even when some nodes fail or act adversarially. The key result (proved by Lamport, Shostak, and Pease in 1982) is that consensus is impossible with fewer than 3f+1 total nodes, where f is the number of faulty nodes. Two algorithms that address it: Practical Byzantine Fault Tolerance (PBFT) and blockchain consensus mechanisms (like the one used in Bitcoin via proof-of-work)."
    tags: [completeness, hard]

  - question: "Explain the differences between OAuth 2.0 authorization grant types: authorization code, implicit, client credentials, and resource owner password. For each, describe the flow, security level, and appropriate use case."
    expected_answer: "Authorization Code: user is redirected to authorization server, gets a code, which is exchanged for a token server-side; most secure for web apps; used for server-side web applications. Implicit: token is returned directly in the URL fragment without a code exchange; less secure (token exposed in browser); historically used for SPAs but now deprecated in favor of authorization code with PKCE. Client Credentials: application authenticates directly with its own credentials, no user involvement; secure for server-to-server; used for machine-to-machine communication. Resource Owner Password: user provides credentials directly to the application, which exchanges them for a token; least secure (application sees password); only for highly trusted first-party applications, generally discouraged."
    tags: [completeness, hard]

  - question: "Describe the four pillars of observability in modern distributed systems: metrics, logs, traces, and profiling. Explain what each captures, one tool for each, and how they complement each other."
    expected_answer: "Metrics: numerical measurements over time (latency, error rates, CPU usage); tool: Prometheus; provides high-level system health overview. Logs: timestamped records of discrete events; tool: the ELK stack (Elasticsearch, Logstash, Kibana); provides detailed context about specific events. Traces: end-to-end tracking of requests across services; tool: Jaeger; shows how requests flow through the system and where latency occurs. Profiling: detailed analysis of resource consumption at code level (CPU, memory, function execution time); tool: pprof or Pyroscope; identifies specific code-level bottlenecks. Together they form a complete picture: metrics alert you to problems, traces help locate which service is affected, logs provide detail on what happened, and profiling reveals why at the code level."
    tags: [completeness, hard]

  - question: "Explain the trade-offs between three consistency models in distributed systems: strong consistency, eventual consistency, and causal consistency. Define each, give a use case, and describe the performance implications."
    expected_answer: "Strong consistency: every read returns the most recent write; required for banking/financial transactions; highest latency and lowest availability due to synchronization overhead. Eventual consistency: given enough time without new writes, all replicas converge to the same value; suitable for social media feeds and DNS; lowest latency and highest availability but clients may read stale data. Causal consistency: operations that are causally related are seen by all nodes in the same order, but concurrent operations may be seen in different orders; suitable for collaborative editing and messaging; moderate latency and availability, preserves intuitive ordering without full synchronization cost."
    tags: [completeness, hard]

  - question: "Explain the concept of containerization by comparing Docker containers, virtual machines, and bare metal: describe resource overhead, isolation level, startup time, and appropriate use case for each."
    expected_answer: "Bare metal: no virtualization overhead; applications run directly on hardware; full performance but no isolation between applications; slowest to provision (hardware setup); appropriate for high-performance computing and dedicated workloads. Virtual machines: moderate overhead (hypervisor, full guest OS per VM); strong isolation with separate OS kernels; startup in minutes; appropriate for running different operating systems and legacy applications needing strong isolation. Docker containers: minimal overhead (share host OS kernel, lightweight process isolation); weaker isolation than VMs (shared kernel); startup in seconds or less; appropriate for microservices, CI/CD, and application packaging where density and speed matter."
    tags: [completeness, hard]

  - question: "Describe the three main approaches to handling database migrations in production: blue-green deployment, rolling migration, and expand-contract pattern. Explain each approach, its advantages, and its risks."
    expected_answer: "Blue-green deployment: maintain two identical production environments; deploy migration to the inactive one, test it, then switch traffic; advantage is instant rollback by switching back; risk is the cost of maintaining duplicate infrastructure and handling data synchronization. Rolling migration: apply changes incrementally across nodes in a cluster; advantage is zero downtime and no duplicate infrastructure; risk is running mixed schema versions simultaneously, requiring backward-compatible changes. Expand-contract (also called parallel change): first expand the schema (add new columns/tables alongside old), migrate data and application code, then contract (remove old structures); advantage is safe, gradual transition with no downtime; risk is increased complexity and the discipline needed to complete the contract phase."
    tags: [completeness, hard]

  - question: "Compare three garbage collection strategies: reference counting, mark-and-sweep, and generational GC. Explain how each works, one advantage, one disadvantage, and one language that uses each."
    expected_answer: "Reference counting: tracks the number of references to each object, frees it when count reaches zero; advantage: immediate reclamation of dead objects; disadvantage: cannot handle circular references; used by Python (as its primary GC, supplemented by cycle detection) and Swift. Mark-and-sweep: periodically traverses all reachable objects from root references (mark phase), then frees unreachable objects (sweep phase); advantage: handles circular references; disadvantage: can cause pause times during collection; used in early implementations of Lisp and JavaScript engines. Generational GC: divides objects into generations based on age, collects young generations more frequently since most objects die young; advantage: much better performance by focusing collection on short-lived objects; disadvantage: more complex implementation; used by Java (JVM) and C# (.NET CLR)."
    tags: [completeness, hard]

  - question: "Explain the event loop in JavaScript: what it is, how the call stack, task queue, and microtask queue interact, and give an example showing the execution order of a setTimeout, a Promise, and synchronous code."
    expected_answer: "The event loop is JavaScript's mechanism for handling asynchronous operations in a single-threaded environment. The call stack executes synchronous code. When async operations complete, their callbacks are placed in queues. The microtask queue (for Promises, queueMicrotask) has higher priority than the task queue (for setTimeout, setInterval, I/O). After each task from the call stack completes, all microtasks are processed before the next task. Example: if you have console.log('A'), setTimeout(() => console.log('B'), 0), and Promise.resolve().then(() => console.log('C')), the output order is A, C, B. Synchronous code runs first (A), then microtasks (C from Promise), then macrotasks (B from setTimeout)."
    tags: [completeness, hard]

  - question: "Explain TLS 1.3 handshake: the steps involved, how it differs from TLS 1.2, the security improvements, and the performance benefits."
    expected_answer: "TLS 1.3 handshake steps: client sends ClientHello with supported cipher suites and key shares; server responds with ServerHello, key share, and encrypted extensions/certificate/finished; client sends finished. This is a 1-RTT handshake (compared to 2-RTT in TLS 1.2). Differences from TLS 1.2: removed support for insecure algorithms (RSA key exchange, RC4, SHA-1, DES/3DES, static Diffie-Hellman); mandatory forward secrecy via ephemeral key exchange; simplified cipher suite negotiation. Security improvements: forward secrecy by default, encrypted handshake (more of the handshake is encrypted), removal of legacy vulnerable features. Performance benefits: reduced latency with 1-RTT (vs 2-RTT) initial handshake and 0-RTT resumption for returning connections."
    tags: [completeness, hard]

  - question: "Describe three consensus algorithms for distributed systems (Paxos, Raft, PBFT): how each works at a high level, fault tolerance model, and one system that implements each."
    expected_answer: "Paxos: uses a proposer/acceptor/learner model where a proposer suggests a value and acceptors vote; tolerates crash failures of up to f nodes with 2f+1 total nodes; implemented in Google's Chubby lock service. Raft: designed as a more understandable alternative to Paxos, using a leader-based approach with leader election, log replication, and safety guarantees; tolerates crash failures of up to f nodes with 2f+1 total nodes; implemented in etcd (used by Kubernetes). PBFT (Practical Byzantine Fault Tolerance): uses a three-phase protocol (pre-prepare, prepare, commit) where nodes exchange messages to reach agreement; tolerates Byzantine (arbitrary/malicious) failures of up to f nodes with 3f+1 total nodes; implemented in Hyperledger Fabric."
    tags: [completeness, hard]

  - question: "Explain the MapReduce programming model: what the map phase does, what the reduce phase does, how data flows between them, give a concrete word-count example, and name two limitations of MapReduce."
    expected_answer: "Map phase: takes input data, processes each element independently, and emits key-value pairs. Reduce phase: groups all values with the same key and combines them. Data flow: input is split across mappers, mappers emit intermediate key-value pairs, a shuffle/sort step groups by key, reducers process each group. Word-count example: mappers read text and emit (word, 1) for each word; shuffle groups all counts for the same word; reducers sum the counts to produce (word, total_count). Limitations: (1) Not efficient for iterative algorithms (like machine learning) because each iteration requires a full read/write cycle to disk. (2) High latency due to disk I/O between stages, making it unsuitable for real-time processing. This is why frameworks like Spark (in-memory) and Flink (streaming) were developed."
    tags: [completeness, hard]
