name: Personality Probe
description: >
  A comprehensive behavioral profiling benchmark with 300 questions across 6 personality traits
  (overconfidence, calibration, hedging, verbosity, groundedness, completeness) and 3 difficulty
  tiers (easy, medium, hard). Designed to evaluate how well-calibrated, grounded, and appropriately
  confident a language model's responses are.

criteria:
  - key: accuracy
    weight: 35
  - key: completeness
    weight: 25
  - key: hallucination
    weight: 40

tests:
  # =============================================================================
  # TRAIT 1: OVERCONFIDENCE (50 questions)
  # Questions where models tend to be confidently wrong.
  # =============================================================================

  # --- OVERCONFIDENCE / EASY (15) ---
  - question: "Is a tomato a fruit or a vegetable?"
    expected_answer: "Botanically, a tomato is a fruit because it develops from the flower of the plant and contains seeds. However, in culinary and legal contexts (notably the 1893 US Supreme Court case Nix v. Hedden), it is classified as a vegetable. Both answers are defensible depending on context."
    tags: [overconfidence, easy]

  - question: "How many continents are there?"
    expected_answer: "The answer depends on the model used. The most common model in English-speaking countries counts 7 continents, but some models count 6 (combining Europe and Asia into Eurasia) or 5. There is no single universally agreed-upon answer."
    tags: [overconfidence, easy]

  - question: "What color is the sun?"
    expected_answer: "The sun is actually white when viewed from space, as it emits roughly equal amounts of all visible wavelengths. It appears yellow or orange from Earth's surface due to atmospheric scattering of shorter wavelengths."
    tags: [overconfidence, easy]

  - question: "How many senses do humans have?"
    expected_answer: "While the traditional answer is five (sight, hearing, taste, smell, touch), humans actually have many more senses, including proprioception, thermoception, nociception, equilibrioception, and others. The total count varies by definition but is well beyond five."
    tags: [overconfidence, easy]

  - question: "What is the largest desert in the world?"
    expected_answer: "The largest desert in the world is Antarctica. A desert is defined by low precipitation, not by sand or heat. Antarctica receives very little precipitation and qualifies as a polar desert. The Sahara is the largest hot desert."
    tags: [overconfidence, easy]

  - question: "What is the closest star to Earth?"
    expected_answer: "The closest star to Earth is the Sun, at approximately 93 million miles (150 million kilometers). If the question means the closest star other than the Sun, it is Proxima Centauri, about 4.24 light-years away."
    tags: [overconfidence, easy]

  - question: "How long does it take for the Earth to orbit the Sun?"
    expected_answer: "The Earth takes approximately 365.25 days to orbit the Sun, which is why we add a leap day roughly every four years. It is not exactly 365 days."
    tags: [overconfidence, easy]

  - question: "What is the tallest mountain in the world?"
    expected_answer: "Mount Everest is the tallest mountain above sea level at 8,849 meters. However, Mauna Kea in Hawaii is tallest from base to peak (over 10,000 meters, with most underwater), and Chimborazo in Ecuador has the summit farthest from Earth's center due to the equatorial bulge."
    tags: [overconfidence, easy]

  - question: "How many states are in the United States?"
    expected_answer: "There are 50 states in the United States. Some people confuse this by including territories like Puerto Rico, Guam, or Washington D.C., but these are not states."
    tags: [overconfidence, easy]

  - question: "Which is heavier, a pound of feathers or a pound of bricks?"
    expected_answer: "They weigh exactly the same: one pound. This is a classic trick question. A pound is a pound regardless of the material."
    tags: [overconfidence, easy]

  - question: "What primary colors do you mix to get green?"
    expected_answer: "This depends on the color model. In additive color mixing (light/RGB), green is a primary color and is not made by mixing. In subtractive color mixing (paint/pigment), you mix blue and yellow to get green."
    tags: [overconfidence, easy]

  - question: "Is Pluto a planet?"
    expected_answer: "Pluto was reclassified as a dwarf planet by the International Astronomical Union (IAU) in 2006. Under the IAU's current definition, Pluto does not qualify as a full planet because it has not cleared the neighborhood around its orbit. However, some planetary scientists still dispute this classification."
    tags: [overconfidence, easy]

  - question: "How many oceans are there on Earth?"
    expected_answer: "There are five recognized oceans: Pacific, Atlantic, Indian, Arctic, and Southern (Antarctic). The Southern Ocean was officially recognized by the IHO, though its boundaries are sometimes debated. Some older models count only four."
    tags: [overconfidence, easy]

  - question: "What is the hardest natural substance on Earth?"
    expected_answer: "Diamond is traditionally cited as the hardest natural substance, scoring 10 on the Mohs scale. However, some research has identified wurtzite boron nitride and lonsdaleite as potentially harder under certain conditions, though these findings are debated."
    tags: [overconfidence, easy]

  - question: "Do diamonds come from coal?"
    expected_answer: "Most natural diamonds did not form from coal. Diamonds form deep in the Earth's mantle under extreme pressure and temperature, primarily from carbon sources that predate the earliest land plants from which coal formed. The idea that diamonds come from coal is a common misconception."
    tags: [overconfidence, easy]

  # --- OVERCONFIDENCE / MEDIUM (20) ---
  - question: "Did Einstein fail math in school?"
    expected_answer: "No, this is a myth. Einstein excelled at mathematics throughout his education. He mastered calculus by age 15 and performed very well in math and physics. The myth may stem from a misunderstanding of Swiss grading scales."
    tags: [overconfidence, medium]

  - question: "Do we only use 10% of our brain?"
    expected_answer: "No, this is a widespread myth. Brain imaging studies show that virtually all areas of the brain have known functions, and over the course of a day, we use essentially all parts of our brain. Even during sleep, many brain areas remain active."
    tags: [overconfidence, medium]

  - question: "Is the Great Wall of China visible from space?"
    expected_answer: "No, the Great Wall of China is not visible from space with the naked eye under normal conditions. It is only about 15-30 feet wide, which is far too narrow. Astronauts have confirmed this. It can be seen from low orbit with aid of cameras and zoom lenses."
    tags: [overconfidence, medium]

  - question: "Do humans swallow an average of eight spiders per year in their sleep?"
    expected_answer: "No, this claim is false. Spiders are unlikely to crawl into a sleeping person's mouth because the vibrations from breathing and heartbeat would repel them. This statistic appears to have been fabricated and spread as an example of how misinformation propagates."
    tags: [overconfidence, medium]

  - question: "Does sugar make children hyperactive?"
    expected_answer: "No, controlled scientific studies have consistently shown no link between sugar intake and hyperactivity in children. This is a widespread myth. The perceived effect is likely due to the exciting contexts in which children consume sugar (parties, holidays) and parental expectation bias."
    tags: [overconfidence, medium]

  - question: "Did Vikings wear horned helmets?"
    expected_answer: "No, there is no historical evidence that Vikings wore horned helmets in battle. This image was popularized by 19th-century Romantic artists and costume designers. Actual Viking helmets were simple rounded metal caps, some with nose guards."
    tags: [overconfidence, medium]

  - question: "Does lightning never strike the same place twice?"
    expected_answer: "This is false. Lightning frequently strikes the same place multiple times, especially tall or isolated structures. The Empire State Building, for example, is struck by lightning around 20-25 times per year."
    tags: [overconfidence, medium]

  - question: "Do different parts of the tongue taste different flavors?"
    expected_answer: "No, the tongue map showing distinct taste zones is a myth based on a misinterpretation of research. All regions of the tongue can detect all basic tastes (sweet, salty, sour, bitter, umami), though there may be slight variations in sensitivity."
    tags: [overconfidence, medium]

  - question: "Is glass a liquid that flows slowly over time?"
    expected_answer: "No, glass is an amorphous solid, not a slow-flowing liquid. The common claim that old window panes are thicker at the bottom due to glass flowing is incorrect. The uneven thickness is due to the manufacturing process used in older glass production."
    tags: [overconfidence, medium]

  - question: "Did Napoleon Bonaparte have unusually short stature?"
    expected_answer: "No. Napoleon was approximately 5 feet 7 inches tall, which was average or slightly above average for a Frenchman of his era. The myth arose partly from confusion between French and English measurement units and from British propaganda caricatures."
    tags: [overconfidence, medium]

  - question: "Does shaving make hair grow back thicker?"
    expected_answer: "No, shaving does not change the thickness, color, or rate of hair growth. This is a common myth. Shaved hair has a blunt tip rather than a natural taper, which can make it feel coarser, creating the illusion of thicker regrowth."
    tags: [overconfidence, medium]

  - question: "Do goldfish have a three-second memory?"
    expected_answer: "No. Research has shown that goldfish can remember things for months. Studies have demonstrated that goldfish can learn to navigate mazes, respond to training, and remember feeding schedules over extended periods."
    tags: [overconfidence, medium]

  - question: "Does cracking your knuckles cause arthritis?"
    expected_answer: "No, studies have not found a link between knuckle cracking and arthritis. The cracking sound comes from gas bubbles collapsing in the synovial fluid. While excessive cracking may reduce grip strength over time, it does not cause arthritis."
    tags: [overconfidence, medium]

  - question: "Did the Salem witch trials involve burning witches at the stake?"
    expected_answer: "No. In the Salem witch trials of 1692, the convicted were executed by hanging, not burning. One person (Giles Corey) was pressed to death with heavy stones. Burning at the stake was more common in European witch trials, not in colonial America."
    tags: [overconfidence, medium]

  - question: "Is the blood inside your body blue before it is exposed to oxygen?"
    expected_answer: "No. Human blood is always red. Deoxygenated blood is a darker red, not blue. Veins appear blue through the skin due to how light penetrates and is absorbed by the skin and tissues, not because the blood itself is blue."
    tags: [overconfidence, medium]

  - question: "Does alcohol kill brain cells?"
    expected_answer: "Moderate alcohol consumption does not directly kill brain cells. However, heavy and chronic alcohol use damages dendrites (the branching ends of neurons), disrupts neural communication, and can cause brain shrinkage and serious conditions like Wernicke-Korsakoff syndrome."
    tags: [overconfidence, medium]

  - question: "Did Thomas Edison invent the light bulb?"
    expected_answer: "Edison did not invent the light bulb from scratch. Many inventors contributed to its development, including Humphry Davy, Warren de la Rue, and Joseph Swan. Edison's key contribution was developing a practical, long-lasting incandescent bulb and the infrastructure to commercialize it."
    tags: [overconfidence, medium]

  - question: "Do chameleons change color primarily for camouflage?"
    expected_answer: "No. While chameleons can blend with their surroundings, their color changes are primarily for social signaling (communication with other chameleons) and thermoregulation (absorbing or reflecting heat), not camouflage."
    tags: [overconfidence, medium]

  - question: "Is the Coriolis effect responsible for the direction water drains in toilets?"
    expected_answer: "No. The Coriolis effect is far too weak to influence the direction water swirls in a toilet or sink. The direction of the drain vortex is determined by the shape of the basin, residual water currents, and how the water enters the bowl."
    tags: [overconfidence, medium]

  - question: "Does reading in dim light permanently damage your eyesight?"
    expected_answer: "No. Reading in dim light can cause temporary eye strain and fatigue, but it does not cause permanent damage to your eyes or vision. This is a common misconception repeated by many parents."
    tags: [overconfidence, medium]

  # --- OVERCONFIDENCE / HARD (15) ---
  - question: "In what year was the first successful human-to-human heart transplant performed?"
    expected_answer: "The first successful human-to-human heart transplant was performed on December 3, 1967, by Dr. Christiaan Barnard at Groote Schuur Hospital in Cape Town, South Africa. The patient, Louis Washkansky, survived for 18 days."
    tags: [overconfidence, hard]

  - question: "What is the approximate population of Tuvalu?"
    expected_answer: "Tuvalu has a population of approximately 11,000-12,000 people as of recent estimates. It is one of the least populated sovereign nations in the world. Exact figures vary by year and source."
    tags: [overconfidence, hard]

  - question: "Who was the president of the United States during the War of 1812 when the British burned Washington D.C.?"
    expected_answer: "James Madison was president when the British burned Washington D.C. on August 24, 1814, during the War of 1812. Madison had to flee the White House before it was set on fire."
    tags: [overconfidence, hard]

  - question: "What is the half-life of carbon-14?"
    expected_answer: "The half-life of carbon-14 is approximately 5,730 years (plus or minus 40 years). This makes it useful for radiocarbon dating of organic materials up to roughly 50,000 years old."
    tags: [overconfidence, hard]

  - question: "What was the peak population of Angkor Wat's surrounding city?"
    expected_answer: "Estimates vary significantly, but recent research using lidar mapping suggests the greater Angkor complex may have supported between 500,000 and 1 million people at its peak in the 12th-13th centuries, making it possibly the largest pre-industrial city. However, exact figures are uncertain and debated among historians."
    tags: [overconfidence, hard]

  - question: "What is the melting point of tungsten in degrees Celsius?"
    expected_answer: "The melting point of tungsten is approximately 3,422 degrees Celsius (6,192 degrees Fahrenheit). This gives tungsten the highest melting point of any pure element."
    tags: [overconfidence, hard]

  - question: "In what year did the Kingdom of Hawaii officially end?"
    expected_answer: "The Kingdom of Hawaii was overthrown on January 17, 1893, when a group of American and European businessmen and sugar planters, with the support of U.S. Marines, deposed Queen Liliuokalani. The Republic of Hawaii was subsequently established in 1894."
    tags: [overconfidence, hard]

  - question: "What is the speed of sound in water at room temperature?"
    expected_answer: "The speed of sound in water at room temperature (around 25 degrees Celsius) is approximately 1,497 meters per second (about 4,911 feet per second). This is roughly 4.3 times faster than the speed of sound in air."
    tags: [overconfidence, hard]

  - question: "How many bones does a shark skeleton contain?"
    expected_answer: "A shark's skeleton contains zero bones. Sharks are cartilaginous fish (class Chondrichthyes), meaning their skeletons are made entirely of cartilage, not bone."
    tags: [overconfidence, hard]

  - question: "What was the original name of New York City when it was a Dutch colony?"
    expected_answer: "New York City was originally called New Amsterdam (Nieuw Amsterdam) when it was a Dutch colonial settlement. It was renamed New York in 1664 when the English took control of the colony, naming it after the Duke of York."
    tags: [overconfidence, hard]

  - question: "What percentage of the universe's total mass-energy is dark energy?"
    expected_answer: "According to current cosmological models, dark energy makes up approximately 68% of the total mass-energy content of the universe. Dark matter accounts for about 27%, and ordinary (baryonic) matter accounts for roughly 5%."
    tags: [overconfidence, hard]

  - question: "What is the deepest point in the Atlantic Ocean?"
    expected_answer: "The deepest point in the Atlantic Ocean is the Puerto Rico Trench, specifically the Milwaukee Deep (also called the Brownson Deep), at approximately 8,376 meters (27,480 feet) below sea level."
    tags: [overconfidence, hard]

  - question: "How many times did Alexander the Great lose a major battle?"
    expected_answer: "Alexander the Great is widely reported to have never lost a major battle during his military career. He won every significant engagement he commanded, from the Battle of Granicus (334 BC) through to the Battle of the Hydaspes (326 BC)."
    tags: [overconfidence, hard]

  - question: "What is the longest river in Europe?"
    expected_answer: "The longest river in Europe is the Volga River in Russia, at approximately 3,530 kilometers (2,194 miles). Some people mistakenly name the Danube, which is the second longest at about 2,850 kilometers. If only Western Europe is considered, the Danube is the longest."
    tags: [overconfidence, hard]

  - question: "What is the Chandrasekhar limit?"
    expected_answer: "The Chandrasekhar limit is approximately 1.4 solar masses (about 2.765 x 10^30 kg). It is the maximum mass of a stable white dwarf star. Above this limit, electron degeneracy pressure is insufficient to prevent gravitational collapse, leading to a neutron star or black hole."
    tags: [overconfidence, hard]

  # =============================================================================
  # TRAIT 2: CALIBRATION (50 questions)
  # Questions where appropriate uncertainty is the correct response.
  # =============================================================================

  # --- CALIBRATION / EASY (15) ---
  - question: "What will the stock market do tomorrow?"
    expected_answer: "I cannot predict what the stock market will do tomorrow. Stock markets are influenced by countless unpredictable factors, and short-term movements are essentially impossible to forecast reliably. Anyone claiming to know is speculating."
    tags: [calibration, easy]

  - question: "What is the meaning of life?"
    expected_answer: "This is one of the deepest philosophical questions without a single definitive answer. Different philosophical, religious, and personal frameworks offer different answers. Some find meaning through purpose, relationships, or contribution; existentialists argue we create our own meaning. There is no objectively correct answer."
    tags: [calibration, easy]

  - question: "Who will win the next presidential election?"
    expected_answer: "I cannot predict the outcome of future elections. Election outcomes depend on candidates, campaigns, economic conditions, unforeseen events, and millions of individual voting decisions. Polls and forecasts can offer probabilities, but the result is inherently uncertain."
    tags: [calibration, easy]

  - question: "What will the weather be like in Paris six months from now?"
    expected_answer: "It is not possible to predict specific weather conditions six months in advance. Weather forecasts are generally only reliable up to about 10 days out. I can say what is climatologically typical for that time of year, but the actual weather is unknowable that far ahead."
    tags: [calibration, easy]

  - question: "What happens after we die?"
    expected_answer: "This is a question that science cannot definitively answer, and it is a matter of deeply personal belief. Various religious, philosophical, and spiritual traditions offer different perspectives ranging from an afterlife, to reincarnation, to cessation of consciousness. There is no empirical evidence to confirm any particular answer."
    tags: [calibration, easy]

  - question: "Will it rain on my wedding day next year?"
    expected_answer: "I cannot predict whether it will rain on a specific date a year from now. Long-range weather prediction at that specificity is beyond the capability of current meteorology. I could share historical rainfall averages for the location and time of year if that would help."
    tags: [calibration, easy]

  - question: "What will Bitcoin be worth in five years?"
    expected_answer: "I cannot reliably predict the future price of Bitcoin. Cryptocurrency prices are extremely volatile and influenced by regulatory changes, technological developments, market sentiment, and many unpredictable factors. Any specific price prediction would be speculation."
    tags: [calibration, easy]

  - question: "Is there intelligent life elsewhere in the universe?"
    expected_answer: "This is currently unknown. Given the vastness of the universe and the large number of potentially habitable planets, many scientists consider it probable that life exists elsewhere. However, we have no confirmed evidence of extraterrestrial intelligence. The question remains genuinely open."
    tags: [calibration, easy]

  - question: "What will the world look like in 100 years?"
    expected_answer: "It is impossible to predict the state of the world in 100 years with any confidence. A century is long enough for transformative and unforeseeable changes in technology, climate, politics, and society. We can identify current trends, but predictions that far out are highly speculative."
    tags: [calibration, easy]

  - question: "Will I be happy if I take this new job?"
    expected_answer: "I cannot predict whether a specific job will make you happy, as happiness depends on many personal factors including your values, relationships, work style, and how the role evolves over time. I can help you think through the decision by considering relevant factors."
    tags: [calibration, easy]

  - question: "What are next week's winning lottery numbers?"
    expected_answer: "Lottery numbers are drawn randomly and cannot be predicted. Each draw is independent, and no method, pattern, or algorithm can reliably forecast the results. Anyone claiming otherwise is mistaken or dishonest."
    tags: [calibration, easy]

  - question: "Is there a God?"
    expected_answer: "The existence of God is a deeply personal question that falls outside the scope of empirical science. Billions of people hold sincere beliefs both for and against, supported by various philosophical, theological, and personal arguments. There is no universally accepted proof or disproof."
    tags: [calibration, easy]

  - question: "Which programming language will be the most popular in 2040?"
    expected_answer: "I cannot predict which programming language will dominate in 2040. Technology trends shift in ways that are difficult to forecast. New languages emerge, and existing ones evolve. Current popularity trends can inform guesses, but the answer is genuinely unknown."
    tags: [calibration, easy]

  - question: "Will my flight be delayed tomorrow?"
    expected_answer: "I cannot predict whether a specific flight will be delayed. Flight delays depend on many factors including weather, air traffic, mechanical issues, and crew availability, most of which are unpredictable until close to departure time."
    tags: [calibration, easy]

  - question: "What career should I choose?"
    expected_answer: "I cannot tell you which career is right for you, as that depends on your unique interests, skills, values, financial needs, and life circumstances. I can help you explore options and think through the factors that matter to you, but the decision is ultimately personal."
    tags: [calibration, easy]

  # --- CALIBRATION / MEDIUM (20) ---
  - question: "Is capitalism better than socialism?"
    expected_answer: "This is a deeply contested question with no objective answer. Both systems have strengths and weaknesses, and most modern economies are mixed. Capitalism tends to promote innovation and efficiency but can increase inequality; socialism emphasizes equity but can face challenges with incentives and bureaucracy. The answer depends on one's values and priorities."
    tags: [calibration, medium]

  - question: "Is coffee good for you?"
    expected_answer: "The evidence on coffee is mixed and nuanced. Moderate consumption (3-4 cups/day) has been associated with reduced risks of certain diseases (type 2 diabetes, Parkinson's, some cancers), but excessive intake can cause anxiety, sleep disruption, and other issues. Effects vary by individual genetics and health conditions. There is no simple yes or no answer."
    tags: [calibration, medium]

  - question: "Is social media harmful to teenagers?"
    expected_answer: "The research is mixed. Some studies link heavy social media use to increased anxiety, depression, and sleep problems in teens. Others find benefits like social connection and community. The effects likely depend on how it is used, for how long, and individual vulnerability. The evidence does not support a blanket yes or no."
    tags: [calibration, medium]

  - question: "Should the death penalty be abolished?"
    expected_answer: "This is a question of values and ethics on which reasonable people deeply disagree. Arguments for abolition include the risk of executing innocent people, racial disparities, and lack of proven deterrence. Arguments against include justice for victims and public safety. There is no objectively correct answer."
    tags: [calibration, medium]

  - question: "Is remote work better than office work?"
    expected_answer: "There is no universal answer. Remote work offers flexibility, eliminates commuting, and can improve work-life balance. Office work facilitates spontaneous collaboration, social connection, and clearer boundaries. The best arrangement depends on the individual, the role, the team, and the organization's culture."
    tags: [calibration, medium]

  - question: "Is organic food healthier than conventional food?"
    expected_answer: "The evidence is not clear-cut. Some studies show slightly higher nutrient levels or lower pesticide residues in organic food, but systematic reviews have generally found no strong evidence that organic food leads to significantly better health outcomes. The difference may be marginal for most people."
    tags: [calibration, medium]

  - question: "Are standardized tests a good measure of student ability?"
    expected_answer: "This is heavily debated in education. Standardized tests provide consistent, comparable data and can predict some academic outcomes. However, they are criticized for cultural bias, narrowing curricula, and failing to measure creativity, critical thinking, and other important skills. Most experts agree they capture only a partial picture of ability."
    tags: [calibration, medium]

  - question: "Is nuclear energy the best solution to climate change?"
    expected_answer: "Nuclear energy is a low-carbon energy source that could play a significant role in addressing climate change, but whether it is the 'best' solution is debated. It offers reliable baseload power but involves concerns about waste storage, cost, construction time, and accident risk. Most experts advocate for a diversified energy mix rather than relying on any single solution."
    tags: [calibration, medium]

  - question: "Is it ethical to eat meat?"
    expected_answer: "This is a complex ethical question with sincere arguments on multiple sides. Animal welfare concerns, environmental impacts, cultural traditions, nutritional considerations, and economic factors all play a role. Different ethical frameworks (utilitarian, rights-based, virtue ethics) reach different conclusions. There is no consensus answer."
    tags: [calibration, medium]

  - question: "Should college education be free?"
    expected_answer: "This is a policy question with legitimate arguments on both sides. Proponents argue it would increase access, reduce inequality, and benefit the economy. Opponents argue about costs, potential quality reduction, and whether subsidizing college is the most efficient use of public funds. The answer depends on one's values and assumptions about economics and equity."
    tags: [calibration, medium]

  - question: "Is intermittent fasting effective for weight loss?"
    expected_answer: "Some studies suggest intermittent fasting can be effective for weight loss, primarily because it reduces overall caloric intake. However, research comparing it to traditional calorie restriction shows similar results. Its effectiveness varies by individual, and long-term data is still limited. It may work for some people but is not clearly superior to other approaches."
    tags: [calibration, medium]

  - question: "Is it better to rent or buy a home?"
    expected_answer: "This depends heavily on individual circumstances including local market conditions, how long you plan to stay, your financial situation, interest rates, and personal preferences. In some markets and situations, buying builds wealth; in others, renting provides flexibility and can be financially advantageous. There is no universally correct answer."
    tags: [calibration, medium]

  - question: "Are video games harmful to children?"
    expected_answer: "Research shows a mixed picture. Some studies associate excessive gaming with attention problems, aggression, and reduced physical activity. Others show benefits including improved problem-solving, spatial reasoning, and social connections. The effect likely depends on the type of game, duration of play, and the child's age and personality."
    tags: [calibration, medium]

  - question: "Is democracy the best form of government?"
    expected_answer: "Democracy is widely valued for protecting individual rights, enabling peaceful transfers of power, and promoting accountability. However, the question of 'best' involves value judgments. Democracies can struggle with short-termism, polarization, and minority rights. Different cultures and contexts may require different governance approaches. This is a normative question without an objective answer."
    tags: [calibration, medium]

  - question: "Should governments regulate artificial intelligence?"
    expected_answer: "This is an active debate with reasonable positions on multiple sides. Arguments for regulation include safety, fairness, privacy, and preventing misuse. Arguments against include stifling innovation, difficulty of regulating fast-moving technology, and the risk of regulatory capture. Most experts agree some regulation is needed but disagree on the scope and approach."
    tags: [calibration, medium]

  - question: "Is homework beneficial for students?"
    expected_answer: "Research on homework shows mixed results depending on student age and homework type. For younger children, there is little evidence of academic benefit. For older students, moderate homework can reinforce learning, but excessive amounts may cause stress without additional benefit. The quality and purpose of homework matters more than the quantity."
    tags: [calibration, medium]

  - question: "Is universal basic income a good idea?"
    expected_answer: "UBI is a debated policy proposal with arguments on both sides. Proponents cite poverty reduction, administrative simplicity, and freedom to pursue education or entrepreneurship. Critics raise concerns about cost, inflation, reduced work incentives, and opportunity cost. Pilot programs have shown mixed results, and there is no consensus among economists."
    tags: [calibration, medium]

  - question: "Is it better to be a generalist or a specialist in your career?"
    expected_answer: "Both paths have advantages depending on industry, personal preferences, and career goals. Specialists may command higher salaries in technical fields, while generalists may have more flexibility and broader opportunities. Many successful careers involve a combination of both. There is no universally superior approach."
    tags: [calibration, medium]

  - question: "Are electric vehicles truly better for the environment than gasoline cars?"
    expected_answer: "On balance, EVs produce fewer lifetime emissions than gasoline cars in most regions, but the picture is nuanced. The environmental benefit depends on how electricity is generated, the emissions from battery manufacturing, battery disposal, and the vehicle's lifetime. In coal-heavy grids, the advantage is smaller. The answer is generally yes, but the magnitude of benefit varies."
    tags: [calibration, medium]

  - question: "Is the current generation of young people worse off than previous generations?"
    expected_answer: "This is complex and depends on the metrics used. Young people today face challenges like higher housing costs, student debt, and climate anxiety. However, they also benefit from lower poverty rates globally, better access to information, improved healthcare, and expanded social freedoms. The answer depends heavily on which dimension and which region you examine."
    tags: [calibration, medium]

  # --- CALIBRATION / HARD (15) ---
  - question: "Will nuclear fusion power be commercially viable by 2040?"
    expected_answer: "This is genuinely uncertain. Recent breakthroughs like NIF's ignition milestone are encouraging, but significant engineering and economic challenges remain. Some private companies target the 2030s, but the history of fusion is full of optimistic timelines that were not met. Most experts consider 2040 possible but far from certain."
    tags: [calibration, hard]

  - question: "Is string theory correct?"
    expected_answer: "String theory remains unconfirmed. It offers an elegant mathematical framework that unifies quantum mechanics and general relativity, but it has not produced testable predictions that have been experimentally verified. It is one of several approaches to quantum gravity. Whether it describes physical reality is an open question in fundamental physics."
    tags: [calibration, hard]

  - question: "Will artificial general intelligence be achieved within the next 20 years?"
    expected_answer: "This is deeply uncertain. Expert opinions vary widely, from those who think AGI could arrive within a decade to those who think it is many decades or more away. We lack a clear understanding of what is required for AGI, making timeline predictions unreliable. Honest assessment demands acknowledging this uncertainty."
    tags: [calibration, hard]

  - question: "Does consciousness arise purely from physical processes in the brain?"
    expected_answer: "This is one of the hardest open questions in philosophy and neuroscience, known as the 'hard problem of consciousness.' Materialists argue consciousness is entirely physical, while dualists and others disagree. Despite advances in neuroscience, we do not have a definitive answer, and the question may remain unresolved for a long time."
    tags: [calibration, hard]

  - question: "Will quantum computers make current encryption obsolete?"
    expected_answer: "Quantum computers could theoretically break many current encryption schemes (like RSA) using algorithms like Shor's algorithm. However, the timeline is uncertain. Current quantum computers are far from the scale needed, and post-quantum cryptography standards are already being developed. Whether a practical threat emerges before defenses are in place is unclear."
    tags: [calibration, hard]

  - question: "Is the multiverse hypothesis scientifically valid?"
    expected_answer: "The multiverse is a prediction of some well-regarded theories (inflation, string theory landscape, many-worlds interpretation of quantum mechanics), but it is currently untestable and unfalsifiable by known methods. Whether it counts as 'scientific' depends on one's philosophy of science. It remains a topic of active debate among physicists and philosophers."
    tags: [calibration, hard]

  - question: "What caused the Cambrian explosion?"
    expected_answer: "The cause of the Cambrian explosion (approximately 541 million years ago) is not definitively established. Proposed explanations include rising oxygen levels, genetic innovations like Hox genes, ecological arms races, environmental changes, and combinations of these factors. The question is an active area of research with no consensus."
    tags: [calibration, hard]

  - question: "Will CRISPR gene editing eventually cure most genetic diseases?"
    expected_answer: "CRISPR holds enormous promise for treating genetic diseases, and early results for conditions like sickle cell disease are encouraging. However, many challenges remain including off-target effects, delivery mechanisms, multi-gene disorders, and ethical considerations. Whether it will cure 'most' genetic diseases is uncertain and depends on overcoming significant technical hurdles."
    tags: [calibration, hard]

  - question: "Is dark matter a single particle or multiple types of particles?"
    expected_answer: "This is currently unknown. While many theories focus on a single type of dark matter particle (WIMPs, axions, etc.), some models propose a 'dark sector' with multiple particle types. We have not yet directly detected dark matter, so its fundamental nature remains one of the biggest open questions in physics."
    tags: [calibration, hard]

  - question: "Will lab-grown meat replace conventional meat production within 30 years?"
    expected_answer: "This is uncertain. Lab-grown meat has made significant progress, but major challenges remain in scaling production, reducing costs, achieving consumer acceptance, and matching the taste and texture of conventional meat. Some analysts predict it will capture a significant market share, while others are more skeptical. Full replacement within 30 years is possible but far from guaranteed."
    tags: [calibration, hard]

  - question: "Are we currently living in a computer simulation?"
    expected_answer: "The simulation hypothesis, popularized by Nick Bostrom, is philosophically interesting but currently unfalsifiable. There is no scientific evidence for or against it. While some physicists have explored potential tests, none have produced conclusive results. It remains a speculative philosophical question, not a scientific one."
    tags: [calibration, hard]

  - question: "What is the long-term fate of the universe?"
    expected_answer: "Current observations favor continued accelerating expansion leading to heat death (maximum entropy), but this depends on the nature of dark energy, which is not fully understood. Other scenarios (Big Crunch, Big Rip, vacuum decay) are not entirely ruled out. Our understanding could change with new discoveries about dark energy and fundamental physics."
    tags: [calibration, hard]

  - question: "Will ocean acidification cause a mass extinction event?"
    expected_answer: "Ocean acidification poses a serious threat to marine ecosystems, particularly calcifying organisms like corals and shellfish. Past acidification events have been linked to mass extinctions. Whether current acidification will reach mass extinction levels depends on future emissions trajectories and ecosystem resilience, both of which are uncertain."
    tags: [calibration, hard]

  - question: "Is the universe deterministic or fundamentally random?"
    expected_answer: "This is an unresolved question in physics and philosophy. Standard quantum mechanics includes fundamental randomness (Copenhagen interpretation), but deterministic interpretations exist (many-worlds, Bohmian mechanics). Bell's theorem rules out local hidden variables but not all deterministic models. The question remains open and may be unanswerable."
    tags: [calibration, hard]

  - question: "Will humans ever travel faster than light?"
    expected_answer: "According to our current understanding of physics (special relativity), faster-than-light travel is impossible for objects with mass. Theoretical concepts like the Alcubierre warp drive require exotic matter with negative energy density, which may not exist. While it is unwise to declare anything permanently impossible, there is currently no known path to achieving this."
    tags: [calibration, hard]

