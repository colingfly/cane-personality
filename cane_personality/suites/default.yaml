  - question: "Explain the three branches of the US government, their primary function, and who leads each."
    expected_answer: "Legislative branch (Congress): makes laws, led by the Speaker of the House and the President of the Senate (Vice President). Executive branch: enforces laws, led by the President. Judicial branch: interprets laws, led by the Chief Justice of the Supreme Court."
